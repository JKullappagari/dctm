# Remote MFE — served cross-origin from the shell, so every response (incl. JS
# chunks loaded by native federation) needs CORS headers.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    location / {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        try_files $uri $uri/ /index.html;
    }
}
